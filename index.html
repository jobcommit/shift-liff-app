<script>
  window.onload = function() {
    // 複数選択モードに変更 (mode: "multiple")
    flatpickr("#targetDate", { 
      locale: "ja", 
      dateFormat: "Y/m/d", 
      minDate: "today",
      mode: "multiple", // これでカレンダーでポチポチ複数選べます
      conjunction: ", "
    });

    liff.init({ liffId: "あなたのLIFF_ID" }).then(() => {
      if (!liff.isLoggedIn()) liff.login();
      else document.getElementById('userId').value = liff.getContext().userId;
    });
  };

  async function handleSubmit() {
    const dates = document.getElementById('targetDate').value; // "2026/04/21, 2026/04/22" とカンマ区切りで取得
    const start = document.getElementById('startTime').value;
    const end = document.getElementById('endTime').value;
    
    if (!dates) { alert("日付を選択してください"); return; }

    // 削除機能のUI代わり：時間が空なら「削除」として扱う
    const timeRange = (start === "" || end === "") ? "削除" : `${start}-${end}`;
    const message = `【シフト一括】\n日付:${dates}\n時間:${timeRange}`;

    try {
      await liff.sendMessages([{ type: 'text', text: message }]);
      liff.closeWindow();
    } catch (error) {
      alert("エラー: " + error);
    }
  }
</script>

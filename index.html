<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト管理システム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 20px 15px; background-color: #e6f2ff; color: #333; }
    .container { max-width: 450px; margin: auto; background: #ffffff; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    h2 { text-align: center; color: #0056d2; margin-bottom: 20px; font-size: 1.4rem; }
    .status-bar { background: #fff9c4; padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 15px; text-align: center; color: #856404; display: none; }
    .field { margin-bottom: 18px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; font-size: 0.9rem; }
    input { width: 100%; padding: 12px; border: 1px solid #c2d1e5; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .type-selector { display: flex; gap: 10px; }
    .type-btn { flex: 1; padding: 12px; border: 1px solid #c2d1e5; background: #fff; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; }
    .type-btn.active { background: #0056d2; color: #fff; border-color: #0056d2; font-weight: bold; }
    .hint { font-size: 0.75rem; color: #666; margin-top: 5px; line-height: 1.4; }
    button.main-btn { width: 100%; padding: 16px; background: #0056d2; color: white; border: none; border-radius: 30px; font-size: 17px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    .has-shift { background: #ffeb3b !important; border-radius: 50% !important; font-weight: bold !important; color: #000 !important; }
    #loading-overlay { display: none; text-align: center; padding: 10px; color: #0056d2; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2>シフト管理・確認</h2>
  <div id="status-bar" class="status-bar">黄色い日は提出済みです</div>
  
  <form id="shift-form">
    <input type="hidden" id="userId">
    <input type="hidden" id="workType" value="出社">

    <div class="field">
      <label>勤務日（複数選択可）</label>
      <input type="text" id="targetDate" placeholder="タップして日付を選択">
    </div>

    <div class="field">
      <label>勤務区分</label>
      <div class="type-selector">
        <div id="btn-office" class="type-btn active" onclick="setType('出社')">出社</div>
        <div id="btn-remote" class="type-btn" onclick="setType('リモート')">リモート</div>
      </div>
    </div>

    <div class="field">
      <label>勤務時間（15分刻み）</label>
      <div style="display:flex; gap:10px; align-items:center;">
        <input type="time" id="startTime" value="10:00" step="900">
        <span>〜</span>
        <input type="time" id="endTime" value="19:30" step="900">
      </div>
      <div class="hint">※前月・今月・来月のみ選択可能です。</div>
    </div>

    <button type="button" class="main-btn" id="submitBtn" onclick="handleSubmit()">送信する</button>
    <div id="loading-overlay">送信中...</div>
  </form>
</div>

<script>
  const MY_LIFF_ID = "2008904530-lXx8C9i5"; 
  const GAS_URL = "あなたのGASウェブアプリURL";
  
  let fp; 
  let submittedDates = [];

  function setType(val) {
    document.getElementById('workType').value = val;
    document.getElementById('btn-office').classList.toggle('active', val === '出社');
    document.getElementById('btn-remote').classList.toggle('active', val === 'リモート');
  }

  // カレンダー移動範囲の計算（前月1日〜来月末日）
  const now = new Date();
  const minDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const maxDate = new Date(now.getFullYear(), now.getMonth() + 2, 0);

  // ライブラリの読み込み完了を待ってから初期化
  document.addEventListener("DOMContentLoaded", function() {
    initCalendar();
    initLiff();
  });

  function initCalendar() {
    fp = flatpickr("#targetDate", {
      locale: "ja",
      mode: "multiple",
      dateFormat: "Y/m/d",
      minDate: minDate,
      maxDate: maxDate,
      conjunction: ", ",
      disableMobile: "true", // モバイルでも独自カレンダーを強制表示
      onDayCreate: function(dObj, dStr, fp, dayElem) {
        const date = dayElem.dateObj;
        const formatted = date.getFullYear() + '/' + 
                          ('0' + (date.getMonth() + 1)).slice(-2) + '/' + 
                          ('0' + date.getDate()).slice(-2);
        if (submittedDates.includes(formatted)) {
          dayElem.classList.add("has-shift");
        }
      }
    });
  }

  async function initLiff() {
    try {
      await liff.init({ liffId: MY_LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        const userId = liff.getContext().userId;
        document.getElementById('userId').value = userId;
        loadCurrentShifts(userId);
      }
    } catch (err) { console.error(err); }
  }

  async function loadCurrentShifts(userId) {
    try {
      const response = await fetch(`${GAS_URL}?userId=${userId}`);
      const data = await response.json();
      submittedDates = data.dates || [];
      if (submittedDates.length > 0) {
        document.getElementById('status-bar').style.display = 'block';
        if(fp) fp.redraw();
      }
    } catch (err) { console.error(err); }
  }

  async function handleSubmit() {
    const dates = document.getElementById('targetDate').value;
    const start = document.getElementById('startTime').value;
    const end = document.getElementById('endTime').value;
    const type = document.getElementById('workType').value;
    
    if (!dates) { alert("日付を選択してください"); return; }

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('loading-overlay').style.display = "block";

    const isDelete = (start === "" || end === "");
    const timeRange = isDelete ? "削除" : `${type}(${start}-${end})`;
    const message = `【シフト一括】\n日付:${dates}\n時間:${timeRange}`;

    try {
      await liff.sendMessages([{ type: 'text', text: message }]);
      liff.closeWindow();
    } catch (error) {
      alert("送信エラー: " + error);
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('loading-overlay').style.display = "none";
    }
  }
</script>
</body>
</html>

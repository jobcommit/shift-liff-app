<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト管理システム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 20px 15px; background-color: #e6f2ff; color: #333; }
    .container { max-width: 450px; margin: auto; background: #ffffff; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    h2 { text-align: center; color: #0056d2; margin-bottom: 20px; font-size: 1.4rem; }
    .status-bar { background: #fff9c4; padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 15px; text-align: center; color: #856404; display: none; }
    .field { margin-bottom: 18px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; font-size: 0.9rem; }
    input, select { width: 100%; padding: 12px; border: 1px solid #c2d1e5; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #fff; }
    .type-selector { display: flex; gap: 10px; }
    .type-btn { flex: 1; padding: 12px; border: 1px solid #c2d1e5; background: #fff; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; }
    .type-btn.active { background: #0056d2; color: #fff; border-color: #0056d2; font-weight: bold; }
    .time-flex { display: flex; gap: 10px; align-items: center; }
    button.main-btn { width: 100%; padding: 16px; background: #0056d2; color: white; border: none; border-radius: 30px; font-size: 17px; font-weight: bold; margin-top: 20px; cursor: pointer; }

    /* --- 下部の3ヶ月シフトリスト --- */
    .shift-list-container { margin-top: 30px; border-top: 2px solid #0056d2; padding-top: 20px; }
    .shift-list-title { font-weight: bold; font-size: 1rem; margin-bottom: 15px; color: #0056d2; text-align: center; }
    .shift-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .shift-table th { background: #f0f7ff; padding: 8px; border: 1px solid #c2d1e5; color: #0056d2; }
    .shift-table td { padding: 10px 8px; border: 1px solid #eee; text-align: center; }
    .date-col { font-weight: bold; width: 40%; }
    .val-col { width: 60%; color: #d32f2f; font-weight: bold; }
    .no-data { text-align: center; padding: 20px; color: #999; font-size: 0.8rem; }
    
    .has-shift { background: #ffeb3b !important; border-radius: 50% !important; font-weight: bold !important; color: #000 !important; }
    #loading-overlay { display: none; text-align: center; padding: 10px; color: #0056d2; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2>シフト管理・確認</h2>
  <div id="status-bar" class="status-bar">黄色い日は提出済みです</div>
  
  <form id="shift-form">
    <input type="hidden" id="userId">
    <input type="hidden" id="workType" value="出社">
    <div class="field">
      <label>勤務日（複数選択可）</label>
      <input type="text" id="targetDate" placeholder="タップして日付を選択" readonly>
    </div>
    <div class="field">
      <label>勤務区分</label>
      <div class="type-selector">
        <div id="btn-office" class="type-btn active" onclick="setType('出社')">出社</div>
        <div id="btn-remote" class="type-btn" onclick="setType('リモート')">リモート</div>
      </div>
    </div>
    <div class="field">
      <label>勤務時間</label>
      <div class="time-flex">
        <select id="startTime"></select><span>〜</span><select id="endTime"></select>
      </div>
    </div>
    <button type="button" class="main-btn" id="submitBtn" onclick="handleSubmit()">一括送信する</button>
    <div id="loading-overlay">送信中...</div>
  </form>

  <div class="shift-list-container">
    <div class="shift-list-title">📋 3ヶ月間の申請状況</div>
    <table class="shift-table" id="shift-table">
      <thead>
        <tr><th>日付</th><th>シフト内容</th></tr>
      </thead>
      <tbody id="shift-list-body">
        </tbody>
    </table>
    <div id="no-shift-msg" class="no-data" style="display:none;">現在、申請されているシフトはありません。</div>
  </div>
</div>

<script>
  const MY_LIFF_ID = "2008904530-lXx8C9i5"; 
  const GAS_URL = "あなたのGASウェブアプリURL";
  
  let fp; 
  let submittedDates = [];

  function setType(val) {
    document.getElementById('workType').value = val;
    document.getElementById('btn-office').classList.toggle('active', val === '出社');
    document.getElementById('btn-remote').classList.toggle('active', val === 'リモート');
  }

  function createTimeOptions() {
    const s = document.getElementById('startTime');
    const e = document.getElementById('endTime');
    for (let h = 0; h < 24; h++) {
      for (let m = 0; m < 60; m += 15) {
        const time = ('0' + h).slice(-2) + ":" + ('0' + m).slice(-2);
        s.add(new Option(time, time)); e.add(new Option(time, time));
      }
    }
    s.value = "10:00"; e.value = "19:30";
  }

  document.addEventListener("DOMContentLoaded", function() {
    createTimeOptions();
    const now = new Date();
    fp = flatpickr("#targetDate", {
      locale: "ja", mode: "multiple", dateFormat: "Y/m/d",
      minDate: new Date(now.getFullYear(), now.getMonth() - 1, 1),
      maxDate: new Date(now.getFullYear(), now.getMonth() + 2, 0),
      conjunction: ", ", disableMobile: true,
      onDayCreate: function(dObj, dStr, fp, dayElem) {
        const d = dayElem.dateObj;
        const f = d.getFullYear() + '/' + ('0' + (d.getMonth() + 1)).slice(-2) + '/' + ('0' + d.getDate()).slice(-2);
        if (submittedDates.includes(f)) { dayElem.classList.add("has-shift"); }
      }
    });
    initLiff();
  });

  async function initLiff() {
    try {
      await liff.init({ liffId: MY_LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); }
      else {
        const uid = liff.getContext().userId;
        document.getElementById('userId').value = uid;
        loadCurrentShifts(uid);
      }
    } catch (err) { console.error(err); }
  }

  async function loadCurrentShifts(uid) {
    try {
      const res = await fetch(`${GAS_URL}?userId=${uid}`);
      const data = await res.json();
      submittedDates = data.dates || [];
      const details = data.details || [];

      if (submittedDates.length > 0) {
        document.getElementById('status-bar').style.display = 'block';
        if(fp) fp.redraw();
      }
      renderTable(details);
    } catch (err) { console.error(err); }
  }

  function renderTable(details) {
    const body = document.getElementById('shift-list-body');
    const msg = document.getElementById('no-shift-msg');
    body.innerHTML = "";
    
    if (details.length === 0) {
      msg.style.display = "block";
      return;
    }

    msg.style.display = "none";
    details.forEach(item => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="date-col">${item.date}</td><td class="val-col">${item.val}</td>`;
      body.appendChild(tr);
    });
  }

  async function handleSubmit() {
    const d = document.getElementById('targetDate').value;
    const s = document.getElementById('startTime').value;
    const e = document.getElementById('endTime').value;
    const t = document.getElementById('workType').value;
    if (!d) { alert("日付を選択してください"); return; }
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('loading-overlay').style.display = "block";
    const isDel = (s === "" || e === "");
    const msg = `【シフト一括】\n日付:${d}\n時間:${isDel ? "削除" : t+"("+s+"-"+e+")"}`;
    try {
      await liff.sendMessages([{ type: 'text', text: msg }]);
      liff.closeWindow();
    } catch (err) { alert("エラー"); document.getElementById('submitBtn').disabled = false; }
  }
</script>
</body>
</html>
